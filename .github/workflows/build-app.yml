name: Mobile Builds CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install dependencies
        run: npm ci

      - name: Build Web Application
        run: npx nx run @keep-accounts-app/web:build

      - name: Build Android App
        run: npx nx run @keep-accounts-app/web:build-android

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/web/ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/web/ios/App/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install dependencies
        run: npm ci

      - name: Build Web Application
        run: npx nx run @keep-accounts-app/web:build

      - name: Build iOS App
        run: npx nx run @keep-accounts-app/web:build-ios

      - name: Compress iOS App
        run: zip -r App.app.zip apps/web/ios/App/build/Build/Products/Debug-iphoneos/App.app

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App.app.zip
          path: App.app.zip
